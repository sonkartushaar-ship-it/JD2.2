kind = "web"
previewPath = "/"
title = "Dog Sprite Playground"
version = "1.0.0"
id = "artifacts/dog-game"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/dog-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dog-game", "run", "build" ]
serve = "static"
publicDir = "artifacts/dog-game/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
